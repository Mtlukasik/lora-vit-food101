# LoRA r=16 → ~743K trainable parameters
trainer:
  accelerator: gpu
  devices: 1
  precision: 16-mixed
  max_steps: 5000
  val_check_interval: 500
  log_every_n_steps: 50

model:
  model_name: vit-b16-224-in21k
  optimizer: sgd
  lr: 0.05
  momentum: 0.9
  weight_decay: 0.0
  warmup_steps: 500
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.1
  lora_target_modules:
    - query
    - value

data:
  dataset: food101
  data_dir: data/
  batch_size: 128
  num_workers: 4
  image_size: 224
